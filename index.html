<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강화 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: white; touch-action: manipulation; }
        .success-flash { animation: flash 0.5s ease-out; }
        @keyframes flash {
            0% { background-color: rgba(34, 197, 94, 0.4); }
            100% { background-color: transparent; }
        }
        .failure-flash { animation: flash-red 0.5s ease-out; }
        @keyframes flash-red {
            0% { background-color: rgba(239, 68, 68, 0.4); }
            100% { background-color: transparent; }
        }
        .button-press { transform: scale(0.95); transition: transform 0.1s; }
        .stat-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-md p-6 rounded-3xl shadow-2xl stat-card relative overflow-hidden transition-all duration-300">
        <!-- Header Stats -->
        <div class="flex justify-between items-center mb-8">
            <div class="text-left">
                <p class="text-gray-400 text-sm">소지 골드</p>
                <p id="gold-display" class="text-3xl font-bold text-yellow-400">0G</p>
            </div>
            <div class="text-right">
                <p class="text-gray-400 text-sm">성공 확률</p>
                <p id="chance-display" class="text-2xl font-bold text-green-400">80%</p>
            </div>
        </div>

        <!-- Main Weapon Area -->
        <div class="flex flex-col items-center justify-center py-10 mb-8 rounded-2xl bg-slate-800/50 border border-slate-700">
            <div class="text-sm text-gray-400 mb-2 uppercase tracking-widest">현재 강화 단계</div>
            <div id="level-display" class="text-6xl font-black text-white drop-shadow-lg">+0</div>
            <div id="status-msg" class="mt-4 h-6 text-sm font-medium opacity-0 transition-opacity">성공! +1 골드 획득</div>
        </div>

        <!-- Main Action Button -->
        <button onclick="attemptUpgrade()" class="w-full py-6 mb-6 rounded-2xl bg-indigo-600 hover:bg-indigo-500 active:scale-95 transition-all font-bold text-xl shadow-lg shadow-indigo-500/20">
            강화 시도 (무료)
        </button>

        <!-- Upgrades Section -->
        <div class="grid grid-cols-1 gap-4">
            <!-- Gold Multiplier Upgrade -->
            <button id="upgrade-gold-btn" onclick="upgradeGoldPerSuccess()" class="flex justify-between items-center p-4 rounded-xl bg-slate-700 hover:bg-slate-600 active:scale-98 transition-all border border-slate-600">
                <div class="text-left">
                    <p class="font-bold">골드 획득량 +1</p>
                    <p class="text-xs text-gray-400">현재: 성공 시 <span id="gps-display">1</span>G</p>
                </div>
                <div id="gold-cost-display" class="bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-lg font-bold text-sm">
                    10G
                </div>
            </button>

            <!-- Success Rate Upgrade -->
            <button id="upgrade-rate-btn" onclick="upgradeSuccessRate()" class="flex justify-between items-center p-4 rounded-xl bg-slate-700 hover:bg-slate-600 active:scale-98 transition-all border border-slate-600">
                <div class="text-left">
                    <p class="font-bold">성공 확률 +1%</p>
                    <p class="text-xs text-gray-400 text-red-400" id="rate-max-note">최대: 99%</p>
                </div>
                <div id="rate-cost-display" class="bg-green-500/20 text-green-400 px-3 py-1 rounded-lg font-bold text-sm">
                    500G
                </div>
            </button>
        </div>

        <div class="mt-8 flex justify-between items-center px-1">
            <p class="text-[10px] text-gray-500 uppercase">자동 저장 활성</p>
            <button onclick="resetData()" class="text-[10px] text-red-500/50 hover:text-red-500 transition-colors font-bold uppercase tracking-widest">데이터 초기화</button>
        </div>
    </div>

    <script>
        // 초기 게임 상태
        let level = 0;
        let gold = 0;
        let successRate = 80;
        let goldPerSuccess = 1;

        // 업그레이드 초기 비용
        let goldUpgradeCost = 10;
        let rateUpgradeCost = 500;

        const levelEl = document.getElementById('level-display');
        const goldEl = document.getElementById('gold-display');
        const chanceEl = document.getElementById('chance-display');
        const gpsEl = document.getElementById('gps-display');
        const statusMsgEl = document.getElementById('status-msg');
        const container = document.getElementById('game-container');

        const goldCostEl = document.getElementById('gold-cost-display');
        const rateCostEl = document.getElementById('rate-cost-display');

        // --- 저장 및 불러오기 기능 ---
        const SAVE_KEY = 'upgrade_sim_save_data';

        function saveGame() {
            const gameData = {
                level,
                gold,
                successRate,
                goldPerSuccess,
                goldUpgradeCost,
                rateUpgradeCost
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(gameData));
        }

        function loadGame() {
            const savedData = localStorage.getItem(SAVE_KEY);
            if (savedData) {
                const data = JSON.parse(savedData);
                level = data.level ?? 0;
                gold = data.gold ?? 0;
                successRate = data.successRate ?? 80;
                goldPerSuccess = data.goldPerSuccess ?? 1;
                goldUpgradeCost = data.goldUpgradeCost ?? 10;
                rateUpgradeCost = data.rateUpgradeCost ?? 500;
            }
            updateUI();
        }

        function resetData() {
            if (confirm("정말로 모든 진행 상황을 초기화하시겠습니까?")) {
                localStorage.removeItem(SAVE_KEY);
                location.reload();
            }
        }

        function updateUI() {
            levelEl.innerText = `+${level}`;
            goldEl.innerText = `${gold.toLocaleString()}G`;
            chanceEl.innerText = `${successRate}%`;
            gpsEl.innerText = goldPerSuccess;
            
            goldCostEl.innerText = `${goldUpgradeCost.toLocaleString()}G`;
            rateCostEl.innerText = successRate >= 99 ? 'MAX' : `${rateUpgradeCost.toLocaleString()}G`;

            const goldBtn = document.getElementById('upgrade-gold-btn');
            const rateBtn = document.getElementById('upgrade-rate-btn');

            goldBtn.classList.toggle('opacity-50', gold < goldUpgradeCost);
            rateBtn.classList.toggle('opacity-50', gold < rateUpgradeCost || successRate >= 99);
        }

        function showMessage(msg, isSuccess) {
            statusMsgEl.innerText = msg;
            statusMsgEl.style.opacity = '1';
            statusMsgEl.className = `mt-4 h-6 text-sm font-medium transition-opacity ${isSuccess ? 'text-green-400' : 'text-red-400'}`;
            
            container.classList.remove('success-flash', 'failure-flash');
            void container.offsetWidth; 
            container.classList.add(isSuccess ? 'success-flash' : 'failure-flash');

            setTimeout(() => {
                statusMsgEl.style.opacity = '0';
            }, 1000);
        }

        function attemptUpgrade() {
            const roll = Math.random() * 100;
            
            if (roll < successRate) {
                level++;
                gold += goldPerSuccess;
                showMessage(`성공! +${goldPerSuccess}골드 획득`, true);
            } else {
                if (level > 0) level--;
                showMessage(`강화 실패... 레벨 하락`, false);
            }
            saveGame();
            updateUI();
        }

        function upgradeGoldPerSuccess() {
            if (gold >= goldUpgradeCost) {
                gold -= goldUpgradeCost;
                goldPerSuccess += 1;
                goldUpgradeCost *= 2; 
                saveGame();
                updateUI();
            }
        }

        function upgradeSuccessRate() {
            if (successRate < 99 && gold >= rateUpgradeCost) {
                gold -= rateUpgradeCost;
                successRate += 1;
                rateUpgradeCost *= 3; 
                saveGame();
                updateUI();
            }
        }

        // 초기 로드
        window.onload = loadGame;
    </script>
</body>
</html>
